<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dětský Patrový Domeček — 3D Návrh</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1209; color: #d4c9a8; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
#canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

#ui { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }

/* Tab bar */
#tabs { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px;
  background: rgba(15,18,9,0.85); border: 1px solid #3a4030; border-radius: 10px; padding: 4px;
  backdrop-filter: blur(8px); pointer-events: all; }
.tab { padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 500;
  color: #8a9a72; border: none; background: transparent; transition: all 0.2s; white-space: nowrap; }
.tab:hover { color: #d4c9a8; background: rgba(255,255,255,0.06); }
.tab.active { color: #d4c9a8; background: #2a3020; }

/* Spec chips */
#specs { position: absolute; top: 16px; left: 16px; display: flex; flex-direction: column; gap: 5px; pointer-events: none; }
.chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(15,18,9,0.8); border: 1px solid #3a4030;
  border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #8a9a72; backdrop-filter: blur(6px); }
.chip strong { color: #d4c9a8; }

/* Legend */
#legend { position: absolute; top: 16px; right: 16px; background: rgba(15,18,9,0.85); border: 1px solid #3a4030;
  border-radius: 10px; padding: 12px 14px; backdrop-filter: blur(8px); pointer-events: none; }
#legend h4 { font-size: 11px; color: #8a9a72; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
.leg-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #d4c9a8; margin-bottom: 5px; }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* Controls hint */
#hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(15,18,9,0.75); border: 1px solid #3a4030; border-radius: 8px;
  padding: 6px 14px; font-size: 11px; color: #8a9a72; pointer-events: none; backdrop-filter: blur(6px); }

/* View controls */
#view-controls { position: absolute; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 4px; pointer-events: all; }
.view-btn { background: rgba(15,18,9,0.85); border: 1px solid #3a4030; border-radius: 7px;
  color: #8a9a72; font-size: 11px; padding: 5px 10px; cursor: pointer; transition: all 0.2s; text-align: left; }
.view-btn:hover { color: #d4c9a8; border-color: #5a6a48; }

/* Print button */
#print-btn { position: absolute; bottom: 16px; left: 16px; pointer-events: all; display: none;
  background: rgba(15,18,9,0.85); border: 1px solid #3a4030; border-radius: 7px;
  color: #8a9a72; font-size: 12px; padding: 7px 14px; cursor: pointer; }
#print-btn:hover { color: #d4c9a8; }

/* Dimension overlay for 2D views */
#dim-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="ui">
  <div id="tabs">
    <button class="tab active" onclick="switchView('3d')">3D</button>
    <button class="tab" onclick="switchView('floor1')">Půdorys 1. patro</button>
    <button class="tab" onclick="switchView('floor2')">Půdorys 2. patro</button>
    <button class="tab" onclick="switchView('front')">Nárys zepředu</button>
    <button class="tab" onclick="switchView('side')">Nárys z boku</button>
    <button class="tab" onclick="switchView('section')">Řez</button>
  </div>

  <div id="specs">
    <div class="chip"><strong>310</strong> cm šířka</div>
    <div class="chip"><strong>242</strong> cm hloubka</div>
    <div class="chip"><strong>345</strong> cm výška hřeben</div>
    <div class="chip"><strong>150</strong> cm výška 1. patra</div>
    <div class="chip"><strong>70</strong> cm terasa</div>
  </div>

  <div id="legend">
    <h4>Legenda</h4>
    <div class="leg-item"><div class="leg-dot" style="background:#C4944A"></div> Nosné sloupky</div>
    <div class="leg-item"><div class="leg-dot" style="background:#B8860B"></div> Stěny (palubky)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#A0784C"></div> Podlahy</div>
    <div class="leg-item"><div class="leg-dot" style="background:#6B3A2A"></div> Střecha</div>
    <div class="leg-item"><div class="leg-dot" style="background:#D4A056"></div> Zábradlí</div>
    <div class="leg-item"><div class="leg-dot" style="background:#E85D75"></div> Klouzačka</div>
    <div class="leg-item"><div class="leg-dot" style="background:#5B8C3E"></div> Žebřík</div>
    <div class="leg-item"><div class="leg-dot" style="background:#999999"></div> Betonové patky</div>
  </div>

  <div id="hint">Levé tlačítko: otáčení &nbsp;|&nbsp; Ctrl+levé / pravé tlačítko: posun &nbsp;|&nbsp; Kolečko: zoom</div>

  <div id="view-controls">
    <button class="view-btn" onclick="setPreset('iso')">Izometrický</button>
    <button class="view-btn" onclick="setPreset('front')">Zepředu</button>
    <button class="view-btn" onclick="setPreset('back')">Zezadu</button>
    <button class="view-btn" onclick="setPreset('left')">Zleva</button>
    <button class="view-btn" onclick="setPreset('right')">Zprava</button>
    <button class="view-btn" onclick="setPreset('top')">Shora</button>
  </div>

  <button id="print-btn" onclick="window.print()">Tisk / Export</button>
  <canvas id="dim-canvas"></canvas>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — all dimensions in metres
// ─────────────────────────────────────────────────────────────────────────────
const C = {
  W: 3.10, D: 2.42, H: 3.00, H1: 1.50, TD: 0.70,
  get CD()   { return this.D - this.TD; },       // cabin depth 1.72
  get divZ() { return -this.D / 2 + this.TD; }, // cabin front wall Z ≈ -0.51
  POST: 0.12, WALL_T: 0.04, BEAM: 0.07,
  ROOF_OVERHANG: 0.15, ROOF_PEAK: 0.45,
  DOOR_W: 0.55, DOOR_H: 1.10, DOOR_OFFSET_X: 0.15,
  SIDE_WIN_W: 0.50, SIDE_WIN_H: 0.40,
  FRONT_WIN_W: 0.40, FRONT_WIN_H: 0.35,
  SLIDE_LEN: 2.60, SLIDE_W: 0.42,
  LADDER_W: 0.45, LADDER_H: 1.85, LADDER_RUNGS: 6,
  RAIL_H: 0.90, RAIL_T: 0.04,
};

const COLORS = {
  posts:    '#C4944A',
  walls:    '#B8860B',
  floor:    '#A0784C',
  roof:     '#6B3A2A',
  roofEdge: '#4A2818',
  railing:  '#D4A056',
  slide:    '#E85D75',
  ladder:   '#5B8C3E',
  frame:    '#f0e8d0',
  concrete: '#999999',
  glass:    '#a0d0e8',
};

// ─────────────────────────────────────────────────────────────────────────────
// RENDERER SETUP
// ─────────────────────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.VSMShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.localClippingEnabled = true;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const playhouse = new THREE.Group();
scene.add(playhouse);

// ─────────────────────────────────────────────────────────────────────────────
// CAMERAS
// ─────────────────────────────────────────────────────────────────────────────
const perspCam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
perspCam.position.set(6, 5, 7);
perspCam.lookAt(0, 1.5, 0);

let currentCamera = perspCam;

function makeOrtho(left, right, top2, bottom2, camPos, lookAt) {
  const cam = new THREE.OrthographicCamera(left, right, top2, bottom2, 0.01, 50);
  cam.position.copy(camPos);
  cam.lookAt(lookAt);
  return cam;
}

// ─────────────────────────────────────────────────────────────────────────────
// LIGHTS
// ─────────────────────────────────────────────────────────────────────────────
const ambLight = new THREE.AmbientLight(0xfff5e0, 0.4);
scene.add(ambLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.4);
dirLight.position.set(5, 10, -4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -6;
dirLight.shadow.camera.right = 6;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -6;
dirLight.shadow.bias = -0.0003;
dirLight.shadow.radius = 3;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xc0d8ff, 0.3);
fillLight.position.set(-4, 3, 5);
scene.add(fillLight);

// ─────────────────────────────────────────────────────────────────────────────
// ENVIRONMENT / SKY
// ─────────────────────────────────────────────────────────────────────────────
function setupFallbackSky() {
  const cv = document.createElement('canvas');
  cv.width = 2; cv.height = 256;
  const ctx = cv.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 256);
  g.addColorStop(0,    '#3a72c0');
  g.addColorStop(0.35, '#87CEEB');
  g.addColorStop(0.72, '#b8daf0');
  g.addColorStop(1.0,  '#e0dac8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 2, 256);
  const tex = new THREE.CanvasTexture(cv);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  scene.background = tex;
  scene.environment = tex;
}

function tryLoadHDRI() {
  try {
    if (typeof THREE.RGBELoader === 'undefined') { setupFallbackSky(); return; }
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    new THREE.RGBELoader()
      .setDataType(THREE.UnsignedByteType)
      .load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/kloppenheim_06_puresky_1k.hdr',
        (tex) => {
          const env = pmrem.fromEquirectangular(tex).texture;
          scene.environment = env;
          scene.background  = env;
          tex.dispose(); pmrem.dispose();
        },
        undefined,
        () => setupFallbackSky()
      );
  } catch(e) { setupFallbackSky(); }
}

setupFallbackSky();
tryLoadHDRI();

// ─────────────────────────────────────────────────────────────────────────────
// MATERIALS
// ─────────────────────────────────────────────────────────────────────────────
function makeWoodTex(baseColor, grainColor, opts = {}) {
  const sz = opts.sz || 512;
  const cv = document.createElement('canvas');
  cv.width = sz; cv.height = sz;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0, 0, sz, sz);
  // subtle colour noise
  for (let i = 0; i < 600; i++) {
    const v = Math.random() > 0.5 ? 30 : -30;
    ctx.fillStyle = `rgba(${128+v},${80+v},${20+v},0.025)`;
    ctx.fillRect(Math.random()*sz, Math.random()*sz, Math.random()*10+2, Math.random()*5+1);
  }
  // grain lines — 3 passes
  for (let pass = 0; pass < 3; pass++) {
    for (let i = 0; i < 40; i++) {
      ctx.globalAlpha = 0.04 + Math.random() * 0.09;
      ctx.strokeStyle = grainColor;
      ctx.lineWidth = 0.3 + Math.random() * 1.0;
      const y = Math.random() * sz;
      ctx.beginPath(); ctx.moveTo(0, y);
      for (let x = 0; x < sz; x += 4)
        ctx.lineTo(x, y + Math.sin(x*0.012 + i*0.8)*3 + (Math.random()-0.5)*1.2);
      ctx.stroke();
    }
  }
  // knots
  const kn = opts.knots || 2;
  for (let i = 0; i < kn; i++) {
    const kx = Math.random()*sz, ky = Math.random()*sz, kr = 5 + Math.random()*10;
    ctx.globalAlpha = 0.18; ctx.fillStyle = '#4a3520';
    ctx.beginPath(); ctx.ellipse(kx, ky, kr, kr*0.65, Math.random()*Math.PI, 0, Math.PI*2); ctx.fill();
    for (let r = 1; r < 5; r++) {
      ctx.globalAlpha = 0.04; ctx.strokeStyle = '#5a4530'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.ellipse(kx, ky, kr+r*5, kr*0.65+r*3.5, 0, 0, Math.PI*2); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(opts.rx || 2, opts.ry || 2);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function mat(color, opts = {}) {
  return new THREE.MeshStandardMaterial({
    color, roughness: opts.r ?? 0.8, metalness: opts.m ?? 0,
    map: opts.tex || null, side: opts.side ?? THREE.FrontSide,
    transparent: opts.transparent ?? false, opacity: opts.opacity ?? 1,
  });
}

const MAT = {
  post:     mat(COLORS.posts,    { tex: makeWoodTex('#C4944A','#8a6030',{rx:1,ry:4,knots:1}) }),
  wall:     mat(COLORS.walls,    { tex: makeWoodTex('#B8860B','#7a5808',{rx:3,ry:1,knots:2}) }),
  floor:    mat(COLORS.floor,    { tex: makeWoodTex('#A0784C','#6a4828',{rx:2,ry:2,knots:3}) }),
  roof:     mat(COLORS.roof,     { r:0.75, tex: makeWoodTex('#6B3A2A','#3a1808',{rx:2,ry:2,knots:1}) }),
  roofEdge: mat(COLORS.roofEdge, { r:0.9 }),
  railing:  mat(COLORS.railing,  { r:0.7 }),
  slide:    mat(COLORS.slide,    { r:0.25, m:0.3 }),
  ladder:   mat(COLORS.ladder,   { r:0.75 }),
  frame:    mat(COLORS.frame,    { r:0.5 }),
  concrete: mat(COLORS.concrete, { r:0.95 }),
  glass:    mat(COLORS.glass,    { r:0.1, m:0.1, transparent:true, opacity:0.35 }),
};

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function box(w, h, d, material) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

function ab(group, w, h, d, material, x, y, z) {
  const m = box(w, h, d, material);
  m.position.set(x, y, z);
  group.add(m);
  return m;
}

// ─────────────────────────────────────────────────────────────────────────────
// GROUND
// ─────────────────────────────────────────────────────────────────────────────
function createGround() {
  const cv = document.createElement('canvas'); cv.width = 512; cv.height = 512;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#4a7a2e'; ctx.fillRect(0,0,512,512);
  for (let i = 0; i < 3000; i++) {
    const g = 80 + Math.random()*60;
    ctx.fillStyle = `rgba(${30+Math.random()*40},${g},${15+Math.random()*20},0.15)`;
    ctx.fillRect(Math.random()*512, Math.random()*512, 2+Math.random()*5, 2+Math.random()*5);
  }
  ctx.strokeStyle = '#5a8a35';
  for (let i = 0; i < 500; i++) {
    ctx.globalAlpha = 0.08; ctx.lineWidth = 0.5;
    const x = Math.random()*512, y = Math.random()*512;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+(Math.random()-0.5)*3, y-3-Math.random()*5); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(8,8);
  const g = new THREE.Group();
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({map:tex,roughness:1}));
  ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
  g.add(ground);
  // contact shadow
  const shadow = new THREE.Mesh(new THREE.PlaneGeometry(4.5,3.5),
    new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.18,depthWrite:false}));
  shadow.rotation.x = -Math.PI/2; shadow.position.y = 0.003;
  g.add(shadow);
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// FOOTINGS
// ─────────────────────────────────────────────────────────────────────────────
function createFootings() {
  const g = new THREE.Group();
  const hw = C.W/2 - C.POST/2, hd = C.D/2 - C.POST/2;
  for (const [x,z] of [[-hw,hd],[hw,hd],[hw,-hd],[-hw,-hd]])
    ab(g, 0.22, 0.10, 0.22, MAT.concrete, x, -0.05, z);
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// POSTS
// ─────────────────────────────────────────────────────────────────────────────
function createPosts() {
  const g = new THREE.Group();
  const pw = C.POST, ph = C.H, py = C.H/2;
  const hw = C.W/2 - pw/2, hd = C.D/2 - pw/2;
  // 4 corner posts
  for (const [x,z] of [[-hw,hd],[hw,hd],[hw,-hd],[-hw,-hd]])
    ab(g, pw, ph, pw, MAT.post, x, py, z);
  // 2 mid posts (back + front) at X=0
  ab(g, pw, ph, pw, MAT.post, 0, py,  hd);
  ab(g, pw, ph, pw, MAT.post, 0, py, -hd);
  // 2 dividing posts at divZ — only from H1 to H (cabin section)
  const divH = C.H - C.H1, divY = C.H1 + divH/2;
  ab(g, pw, divH, pw, MAT.post, -hw, divY, C.divZ);
  ab(g, pw, divH, pw, MAT.post,  hw, divY, C.divZ);
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// BEAMS
// ─────────────────────────────────────────────────────────────────────────────
function createBeams() {
  const g = new THREE.Group();
  const bm = C.BEAM, hw = C.W/2, hd = C.D/2;

  // Top perimeter at H (cabin only)
  ab(g, C.W, bm, bm, MAT.post, 0, C.H-bm/2, hd-bm/2);      // back
  ab(g, C.W, bm, bm, MAT.post, 0, C.H-bm/2, C.divZ);        // cabin front
  ab(g, bm, bm, C.CD, MAT.post,  hw-bm/2, C.H-bm/2, C.divZ + C.CD/2); // right
  ab(g, bm, bm, C.CD, MAT.post, -hw+bm/2, C.H-bm/2, C.divZ + C.CD/2); // left

  // Ring at H1
  const h1 = C.H1;
  ab(g, C.W, bm, bm, MAT.post, 0, h1-bm/2, hd-bm/2);
  ab(g, C.W, bm, bm, MAT.post, 0, h1-bm/2, -hd+bm/2);
  ab(g, bm, bm, C.D, MAT.post,  hw-bm/2, h1-bm/2, 0);
  ab(g, bm, bm, C.D, MAT.post, -hw+bm/2, h1-bm/2, 0);

  // Joists under 2nd floor
  for (let i = 1; i <= 4; i++)
    ab(g, C.W, bm, bm, MAT.post, 0, h1-bm/2-0.01, -hd + (C.D * i/5));

  // Ground bearers
  for (let i = 1; i <= 3; i++)
    ab(g, C.W, bm, bm, MAT.post, 0, -bm/2, -hd + (C.D * i/4));

  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// FLOORS
// ─────────────────────────────────────────────────────────────────────────────
function createFloors() {
  const g = new THREE.Group();
  // Ground floor
  const gf = box(C.W, 0.05, C.D, MAT.floor);
  gf.position.set(0, 0.025, 0); g.add(gf);
  // 2nd floor
  const f2 = box(C.W, 0.06, C.D, MAT.floor);
  f2.position.set(0, C.H1 + 0.03, 0); g.add(f2);
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// WALLS
// ─────────────────────────────────────────────────────────────────────────────
function createWalls() {
  const g = new THREE.Group();
  const t = C.WALL_T, fT = 0.04;

  // ── Back wall (+Z), full height ──────────────────────────────────────────
  ab(g, C.W, C.H, t, MAT.wall, 0, C.H/2, C.D/2 - t/2);

  // ── Right wall (+X) — 4 panels around side window ───────────────────────
  const swW = C.SIDE_WIN_W, swH = C.SIDE_WIN_H;
  const rx  = C.W/2 - t/2;
  const swY = C.H1 + 0.85;   // window centre Y
  const cabMidZ = (C.divZ + C.D/2) / 2;
  const swCZ = cabMidZ;        // window centre Z = mid of cabin depth
  const swB = swY - swH/2, swT = swY + swH/2;
  const swL = swCZ - swW/2,  swR = swCZ + swW/2;

  // Panel A: front strip (-D/2 to swL)
  const pAd = swL - (-C.D/2);
  if (pAd > 0) ab(g, t, C.H, pAd, MAT.wall, rx, C.H/2, -C.D/2 + pAd/2);
  // Panel B: rear strip (swR to D/2)
  const pBd = C.D/2 - swR;
  if (pBd > 0) ab(g, t, C.H, pBd, MAT.wall, rx, C.H/2, swR + pBd/2);
  // Panel C: window Z-span, below opening (0 to swB)
  if (swB > 0) ab(g, t, swB, swW, MAT.wall, rx, swB/2, swCZ);
  // Panel D: window Z-span, above opening (swT to H)
  const pDh = C.H - swT;
  if (pDh > 0) ab(g, t, pDh, swW, MAT.wall, rx, swT + pDh/2, swCZ);

  // Side window frame + glass
  const wg = new THREE.Group();
  ab(wg, fT, swH+fT*2, fT, MAT.frame, -swW/2-fT/2, 0, 0);
  ab(wg, fT, swH+fT*2, fT, MAT.frame,  swW/2+fT/2, 0, 0);
  ab(wg, fT, fT, swW, MAT.frame, 0,  swH/2+fT/2, 0);
  ab(wg, fT, fT, swW, MAT.frame, 0, -swH/2-fT/2, 0);
  ab(wg, fT, swH, fT, MAT.frame, 0, 0, 0);  // vertical cross
  ab(wg, fT, fT, swW, MAT.frame, 0, 0, 0);  // horizontal cross
  ab(wg, fT*0.3, swH, swW, MAT.glass, fT, 0, 0);
  wg.position.set(rx, swY, swCZ);
  g.add(wg);

  // ── Cabin front wall (at divZ), panels from H1 to H ─────────────────────
  const cfZ  = C.divZ + t/2;
  const cfY0 = C.H1, cfH = C.H - C.H1;
  const dCX  = C.DOOR_OFFSET_X;
  const dW = C.DOOR_W, dH = C.DOOR_H;
  const dL = dCX - dW/2, dR = dCX + dW/2;
  const dTY = cfY0 + dH;
  const fwCX = -C.W/4;
  const fwW = C.FRONT_WIN_W, fwH = C.FRONT_WIN_H;
  const fwL = fwCX - fwW/2, fwR = fwCX + fwW/2;
  const fwBY = cfY0 + (cfH - dH)/2 + dH*0.3;
  const fwCY = fwBY + fwH/2;
  const fwTY = fwBY + fwH;

  // Panel A: left of window
  const pAW = fwL - (-C.W/2);
  if (pAW > 0) ab(g, pAW, cfH, t, MAT.wall, -C.W/2 + pAW/2, cfY0 + cfH/2, cfZ);
  // Panel B: window X-span, below window
  const pBH = fwBY - cfY0;
  if (pBH > 0) ab(g, fwW, pBH, t, MAT.wall, fwCX, cfY0 + pBH/2, cfZ);
  // Panel C: window X-span, above window
  const pCH = C.H - fwTY;
  if (pCH > 0) ab(g, fwW, pCH, t, MAT.wall, fwCX, fwTY + pCH/2, cfZ);
  // Panel D: between window and door
  const pDW = dL - fwR;
  if (pDW > 0) ab(g, pDW, cfH, t, MAT.wall, fwR + pDW/2, cfY0 + cfH/2, cfZ);
  // Panel E: door X-span, above door
  const pEH = C.H - dTY;
  if (pEH > 0) ab(g, dW, pEH, t, MAT.wall, dCX, dTY + pEH/2, cfZ);
  // Panel F: right of door
  const pFW = C.W/2 - dR;
  if (pFW > 0) ab(g, pFW, cfH, t, MAT.wall, dR + pFW/2, cfY0 + cfH/2, cfZ);

  // Door frame
  const dg = new THREE.Group();
  ab(dg, fT, dH+fT, fT, MAT.frame, -dW/2-fT/2, -fT/2, 0);
  ab(dg, fT, dH+fT, fT, MAT.frame,  dW/2+fT/2, -fT/2, 0);
  ab(dg, dW+fT*2, fT, fT, MAT.frame, 0, dH/2+fT/2, 0);
  ab(dg, dW-0.02, dH-0.02, fT, MAT.wall, 0, 0, -fT*0.5);
  dg.position.set(dCX, cfY0 + dH/2, cfZ);
  g.add(dg);

  // Front cabin window frame
  const fg = new THREE.Group();
  ab(fg, fT, fwH+fT*2, fT, MAT.frame, -fwW/2-fT/2, 0, 0);
  ab(fg, fT, fwH+fT*2, fT, MAT.frame,  fwW/2+fT/2, 0, 0);
  ab(fg, fwW+fT*2, fT, fT, MAT.frame, 0,  fwH/2+fT/2, 0);
  ab(fg, fwW+fT*2, fT, fT, MAT.frame, 0, -fwH/2-fT/2, 0);
  ab(fg, fT, fwH, fT, MAT.frame, 0, 0, 0);
  ab(fg, fwW, fT, fT, MAT.frame, 0, 0, 0);
  ab(fg, fT*0.3, fwH, fwW, MAT.glass, fT, 0, 0);
  fg.position.set(fwCX, fwCY, cfZ);
  g.add(fg);

  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// ROOF — pultová (shed), only over cabin
// ─────────────────────────────────────────────────────────────────────────────
function createRoof() {
  const g = new THREE.Group();
  const ov = C.ROOF_OVERHANG, pk = C.ROOF_PEAK;
  const rW = C.W + ov*2;
  const slant = Math.sqrt(C.CD*C.CD + pk*pk);
  const angle = Math.atan(pk / C.CD);
  const cabCZ = (C.divZ + C.D/2) / 2;

  const rPanel = box(rW, 0.05, slant + ov, MAT.roof);
  rPanel.rotation.x = -angle;
  rPanel.position.set(0, C.H + pk/2, cabCZ + ov*0.5);
  g.add(rPanel);

  // Fascia front (low edge)
  const ff = box(rW, 0.12, 0.03, MAT.roofEdge);
  ff.position.set(0, C.H - 0.06, C.divZ - 0.015);
  g.add(ff);
  // Fascia back (high edge)
  const fb = box(rW, 0.12, 0.03, MAT.roofEdge);
  fb.position.set(0, C.H + pk - 0.06, C.D/2 + ov - 0.015);
  g.add(fb);
  // Verge boards (left/right)
  for (const sx of [-1,1]) {
    const vb = box(0.03, 0.10, slant + ov, MAT.roofEdge);
    vb.rotation.x = -angle;
    vb.position.set(sx*(rW/2 + 0.015), C.H + pk/2, cabCZ + ov*0.5);
    g.add(vb);
  }
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// RAILING — terrace: front + left
// ─────────────────────────────────────────────────────────────────────────────
function createRailing() {
  const g = new THREE.Group();
  const t = C.RAIL_T, rh = C.RAIL_H;
  const hw = C.W/2, fZ = -C.D/2;

  // Front railing (full width)
  ab(g, C.W, t, t, MAT.railing, 0, C.H1 + rh, fZ + t/2);
  ab(g, C.W, t, t, MAT.railing, 0, C.H1 + 0.05, fZ + t/2);
  for (let i = 0; i <= 8; i++)
    ab(g, t, rh, t, MAT.railing, -hw + (C.W * i/8), C.H1 + rh/2, fZ + t/2);

  // Left railing (terrace depth)
  const lX = -hw + t/2;
  ab(g, t, t, C.TD, MAT.railing, lX, C.H1 + rh,   fZ + C.TD/2);
  ab(g, t, t, C.TD, MAT.railing, lX, C.H1 + 0.05, fZ + C.TD/2);
  for (let i = 0; i <= 4; i++)
    ab(g, t, rh, t, MAT.railing, lX, C.H1 + rh/2, fZ + (C.TD * i/4));

  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// SLIDE — from right terrace, inclined to ground
// ─────────────────────────────────────────────────────────────────────────────
function createSlide() {
  const g = new THREE.Group();
  const angle    = Math.asin(C.H1 / C.SLIDE_LEN);
  const horizLen = C.SLIDE_LEN * Math.cos(angle);
  const sx  = C.W/2 + 0.05;
  const stZ = -C.D/2 + C.TD/2;
  const midZ = stZ - horizLen/2;

  const surf = box(C.SLIDE_W, 0.03, C.SLIDE_LEN, MAT.slide);
  surf.rotation.x = -angle;
  surf.position.set(sx, C.H1/2, midZ);
  g.add(surf);

  for (const dw of [-1,1]) {
    const fl = box(0.06, 0.12, C.SLIDE_LEN, MAT.slide);
    fl.rotation.x = -angle;
    fl.position.set(sx + dw*(C.SLIDE_W/2 + 0.03), C.H1/2, midZ);
    g.add(fl);
  }
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// LADDER — left side, ~75° from horizontal
// ─────────────────────────────────────────────────────────────────────────────
function createLadder() {
  const g = new THREE.Group();
  const aH   = 75 * Math.PI / 180;
  const rotZ = -(Math.PI/2 - aH);
  const lLen  = C.H1 / Math.sin(aH);
  const lHoriz = lLen * Math.cos(aH);
  const lx = -C.W/2 - lHoriz/2;
  const ly = C.H1/2;
  const lz = -C.D/2 + 0.30;

  // Stringers
  for (const dz of [-C.LADDER_W/2, C.LADDER_W/2]) {
    const str = box(0.04, lLen, 0.04, MAT.ladder);
    str.rotation.z = rotZ;
    str.position.set(lx, ly, lz + dz);
    g.add(str);
  }
  // Rungs
  for (let i = 1; i <= C.LADDER_RUNGS; i++) {
    const frac = i / (C.LADDER_RUNGS + 1);
    const dist = frac * lLen;
    const rx = -C.W/2 - lHoriz + dist * Math.cos(aH);
    const ry = dist * Math.sin(aH);
    const rg = box(0.04, 0.04, C.LADDER_W, MAT.ladder);
    rg.position.set(rx, ry, lz);
    g.add(rg);
  }
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// BUILD MODEL
// ─────────────────────────────────────────────────────────────────────────────
scene.add(createGround());
playhouse.add(createFootings());
playhouse.add(createPosts());
playhouse.add(createBeams());
playhouse.add(createFloors());
playhouse.add(createWalls());
playhouse.add(createRoof());
playhouse.add(createRailing());
playhouse.add(createSlide());
playhouse.add(createLadder());

// ─────────────────────────────────────────────────────────────────────────────
// ORBIT CONTROLS (custom)
// ─────────────────────────────────────────────────────────────────────────────
const orbit = {
  target: new THREE.Vector3(0, 1.5, 0),
  sph: new THREE.Spherical(10, Math.PI/4, Math.PI/6),
  rotating: false, panning: false,
  lx: 0, ly: 0,
};

function applyOrbit() {
  perspCam.position.setFromSpherical(orbit.sph).add(orbit.target);
  perspCam.lookAt(orbit.target);
}
applyOrbit();

renderer.domElement.addEventListener('mousedown', e => {
  orbit.rotating = (e.button === 0 && !e.ctrlKey);
  orbit.panning   = (e.button === 2 || (e.button === 0 && e.ctrlKey));
  orbit.lx = e.clientX; orbit.ly = e.clientY;
  e.preventDefault();
});
window.addEventListener('mouseup', () => { orbit.rotating = orbit.panning = false; });
window.addEventListener('mousemove', e => {
  if (currentCamera !== perspCam) return;
  const dx = e.clientX - orbit.lx, dy = e.clientY - orbit.ly;
  orbit.lx = e.clientX; orbit.ly = e.clientY;
  if (orbit.rotating) {
    orbit.sph.theta -= dx * 0.006;
    orbit.sph.phi   -= dy * 0.006;
    orbit.sph.phi    = Math.max(0.05, Math.min(Math.PI/2-0.02, orbit.sph.phi));
    applyOrbit();
  } else if (orbit.panning) {
    const spd = orbit.sph.radius * 0.001;
    const right = new THREE.Vector3().crossVectors(
      perspCam.getWorldDirection(new THREE.Vector3()), perspCam.up).normalize();
    orbit.target.addScaledVector(right, -dx * spd);
    orbit.target.y += dy * spd;
    applyOrbit();
  }
});
renderer.domElement.addEventListener('wheel', e => {
  if (currentCamera !== perspCam) return;
  orbit.sph.radius = Math.max(2, Math.min(20, orbit.sph.radius * (1 + e.deltaY * 0.001)));
  applyOrbit(); e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

// Touch
let touches = [];
renderer.domElement.addEventListener('touchstart', e => { touches = [...e.touches]; e.preventDefault(); }, {passive:false});
renderer.domElement.addEventListener('touchmove', e => {
  if (currentCamera !== perspCam) return;
  if (e.touches.length === 1 && touches.length === 1) {
    orbit.sph.theta -= (e.touches[0].clientX - touches[0].clientX) * 0.006;
    orbit.sph.phi   -= (e.touches[0].clientY - touches[0].clientY) * 0.006;
    orbit.sph.phi    = Math.max(0.05, Math.min(Math.PI/2-0.02, orbit.sph.phi));
    applyOrbit();
  } else if (e.touches.length === 2 && touches.length === 2) {
    const d1 = Math.hypot(touches[0].clientX-touches[1].clientX, touches[0].clientY-touches[1].clientY);
    const d2 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    orbit.sph.radius = Math.max(2, Math.min(20, orbit.sph.radius * d1/d2));
    applyOrbit();
  }
  touches = [...e.touches]; e.preventDefault();
}, {passive:false});

// ─────────────────────────────────────────────────────────────────────────────
// PRESET VIEWS
// ─────────────────────────────────────────────────────────────────────────────
function setPreset(name) {
  const p = { iso:{r:10,phi:Math.PI/5,theta:Math.PI/6}, front:{r:9,phi:Math.PI/2-0.1,theta:Math.PI},
    back:{r:9,phi:Math.PI/2-0.1,theta:0}, left:{r:9,phi:Math.PI/2-0.1,theta:Math.PI/2},
    right:{r:9,phi:Math.PI/2-0.1,theta:-Math.PI/2}, top:{r:10,phi:0.1,theta:0} }[name];
  if (!p) return;
  orbit.sph.set(p.r, p.phi, p.theta); applyOrbit();
}

// ─────────────────────────────────────────────────────────────────────────────
// VIEW SWITCHING
// ─────────────────────────────────────────────────────────────────────────────
let currentView = '3d';

function switchView(name) {
  currentView = name;
  renderer.clippingPlanes = [];

  const views = ['3d','floor1','floor2','front','side','section'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', views[i] === name));

  const is3d = name === '3d';
  document.getElementById('view-controls').style.display = is3d ? 'flex' : 'none';
  document.getElementById('hint').style.display          = is3d ? 'block' : 'none';
  document.getElementById('print-btn').style.display     = is3d ? 'none' : 'block';
  document.getElementById('dim-canvas').style.display    = is3d ? 'none' : 'block';

  const asp = window.innerWidth / window.innerHeight;
  const oh  = C.H * 1.8, ow = oh * asp;

  if (name === '3d') {
    currentCamera = perspCam;
  } else if (name === 'floor1') {
    const cam = makeOrtho(-ow/2, ow/2, oh/2, -oh/2, new THREE.Vector3(0,10,0), new THREE.Vector3(0,0,0));
    cam.near = 8.6; cam.far = 10.1; cam.updateProjectionMatrix();
    currentCamera = cam;
  } else if (name === 'floor2') {
    const cam = makeOrtho(-ow/2, ow/2, oh/2, -oh/2, new THREE.Vector3(0,10,0), new THREE.Vector3(0,0,0));
    cam.near = 7.1; cam.far = 8.6; cam.updateProjectionMatrix();
    currentCamera = cam;
  } else if (name === 'front') {
    currentCamera = makeOrtho(-ow/2, ow/2, oh/2, -oh/2,
      new THREE.Vector3(0, C.H/2, -10), new THREE.Vector3(0, C.H/2, 0));
  } else if (name === 'side') {
    currentCamera = makeOrtho(-ow/2, ow/2, oh/2, -oh/2,
      new THREE.Vector3(10, C.H/2, 0), new THREE.Vector3(0, C.H/2, 0));
  } else if (name === 'section') {
    renderer.localClippingEnabled = true;
    renderer.clippingPlanes = [new THREE.Plane(new THREE.Vector3(-1,0,0), 0.05)];
    currentCamera = makeOrtho(-ow/2, ow/2, oh/2, -oh/2,
      new THREE.Vector3(10, C.H/2, 0), new THREE.Vector3(0, C.H/2, 0));
  }

  if (!is3d) setTimeout(() => drawDimensions(name), 50);
}

// ─────────────────────────────────────────────────────────────────────────────
// DIMENSION OVERLAY
// ─────────────────────────────────────────────────────────────────────────────
function drawDimensions(view) {
  const cv = document.getElementById('dim-canvas');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.strokeStyle = '#d4c9a8'; ctx.fillStyle = '#d4c9a8';
  ctx.lineWidth = 1; ctx.font = '12px Segoe UI';

  function ws(wx, wy, wz) {
    const v = new THREE.Vector3(wx, wy, wz ?? 0);
    v.project(currentCamera);
    return { x: (v.x+1)/2*cv.width, y: (1-v.y)/2*cv.height };
  }

  function dimH(wx1, wx2, wy, wz, label) {
    const a = ws(wx1,wy,wz), b = ws(wx2,wy,wz);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.fillText(label, (a.x+b.x)/2 - ctx.measureText(label).width/2, a.y - 6);
  }
  function dimV(wx, wy1, wy2, wz, label) {
    const a = ws(wx,wy1,wz), b = ws(wx,wy2,wz);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.save(); ctx.translate(a.x+18, (a.y+b.y)/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(label, -ctx.measureText(label).width/2, 0); ctx.restore();
  }
  function lbl(wx, wy, wz, text) {
    const p = ws(wx,wy,wz); ctx.fillText(text, p.x, p.y);
  }

  if (view === 'front') {
    dimH(-C.W/2, C.W/2, -0.35, -C.D/2, '310 cm šířka');
    dimV(-C.W/2-0.4, 0, C.H1, 0, '150 cm');
    dimV(-C.W/2-0.4, C.H1, C.H, 0, '150 cm');
    lbl(0, 0.75, -C.D/2, 'PŘÍZEMÍ (otevřeno)');
    lbl(0, 2.25, -C.D/2, '2. PATRO');
    lbl(C.divZ, C.H1+0.5, -C.D/2, 'TERASA');
  } else if (view === 'side') {
    dimV(-C.D/2-0.4, 0, C.H1, null, '150');
    dimV(-C.D/2-0.4, C.H1, C.H, null, '150');
    dimH(-C.D/2, C.divZ, -0.35, null, '70 terasa');
    dimH(C.divZ, C.D/2, -0.35, null, '172 kabina');
    lbl(0, C.H+0.2, null, '300 cm (+45 hřeben)');
  } else if (view === 'floor1') {
    dimH(-C.W/2, C.W/2, C.D/2+0.35, 0, '310 cm šířka');
    dimV(C.W/2+0.35, -C.D/2, C.D/2, 0, '242 cm hloubka');
    lbl(-0.5, 0.2, 0.5, 'PŘÍZEMÍ — otevřeno vpředu (-Z) a vlevo (-X)');
    lbl(0.5, 0.2, 0.5, 'Zadní stěna (+Z) ✓');
    lbl(0.5, 0.2, 0, 'Pravá stěna (+X) ✓');
  } else if (view === 'floor2') {
    dimH(-C.W/2, C.W/2, C.D/2+0.35, 0, '310 cm šířka');
    lbl(0, C.H1+0.2, -C.D/2+C.TD/2, 'TERASA (70 cm)');
    lbl(0, C.H1+0.2, C.divZ+C.CD/2, 'KABINA (172 cm)');
  } else if (view === 'section') {
    ctx.fillText('ŘEZ — pohled zprava (X=0)', 20, 30);
    ctx.fillText(`Výška podlahy 2. patra: ${C.H1*100|0} cm`, 20, 50);
    ctx.fillText(`Výška hřebene: ${(C.H+C.ROOF_PEAK)*100|0} cm`, 20, 70);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  perspCam.aspect = window.innerWidth / window.innerHeight;
  perspCam.updateProjectionMatrix();
  if (currentView !== '3d') switchView(currentView);
});

// ─────────────────────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, currentCamera);
}
animate();
</script>
</body>
